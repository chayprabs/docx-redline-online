services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://worker:8000
    ports:
      - "${DOCX_REDLINE_WEB_PORT:-3000}:3000"
    depends_on:
      worker:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DOCX_REDLINE_ARTIFACT_TTL_SECONDS: 900
      DOCX_REDLINE_MAX_UPLOAD_MB: 25
    ports:
      - "${DOCX_REDLINE_WORKER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
