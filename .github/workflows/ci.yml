name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker build -f apps/web/Dockerfile -t docx-redline-web:ci .

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
        working-directory: apps/worker
      - run: pip install -e ".[dev]"
        working-directory: apps/worker
      - run: pytest
        working-directory: apps/worker
      - run: docker build -f apps/worker/Dockerfile -t docx-redline-worker:ci .

  compose:
    runs-on: ubuntu-latest
    env:
      DOCX_REDLINE_WEB_PORT: 3300
      DOCX_REDLINE_WORKER_PORT: 8100
    steps:
      - uses: actions/checkout@v5
      - run: docker compose config
      - run: docker compose up -d --build
      - name: Wait for worker health
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:${DOCX_REDLINE_WORKER_PORT}/health >/tmp/worker-health.json; then
              cat /tmp/worker-health.json
              exit 0
            fi
            sleep 2
          done
          echo "worker health check did not pass in time" >&2
          exit 1
      - name: Wait for web root
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:${DOCX_REDLINE_WEB_PORT}/ >/tmp/web-root.html; then
              exit 0
            fi
            sleep 2
          done
          echo "web root did not pass in time" >&2
          exit 1
      - name: Smoke test web and API routes
        run: |
          curl --fail --silent http://127.0.0.1:${DOCX_REDLINE_WEB_PORT}/docx-compare >/tmp/web-compare.html
          curl --fail --silent http://127.0.0.1:${DOCX_REDLINE_WORKER_PORT}/v1/meta >/tmp/worker-meta.json
          curl --fail --silent http://127.0.0.1:${DOCX_REDLINE_WORKER_PORT}/v1/samples >/tmp/worker-samples.json
          grep -q "DocxRedline" /tmp/web-root.html
          grep -q "Compare" /tmp/web-compare.html
          grep -q "\"artifactTtlSeconds\"" /tmp/worker-meta.json
          grep -q "\"contract-redline\"" /tmp/worker-samples.json
      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
